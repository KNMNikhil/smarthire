services:
  # Backend API
  - type: web
    name: smarthire-backend
    env: node
    region: singapore
    plan: free
    buildCommand: cd server && npm install
    startCommand: cd server && node index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRE
        value: 7d
      - key: DATABASE_URL
        fromDatabase:
          name: smarthire-db
          property: connectionString

  # PostgreSQL Database
  - type: pserv
    name: smarthire-db
    env: docker
    plan: free
    region: singapore